services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.3
    labels:
      - traefik.http.routers.jellyfin.rule=Host(`jellyfin.spaceduck.cloud`)
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - traefik.http.routers.jellyfin.tls=true
      - traefik.http.routers.jellyfin.tls.certresolver=letsencryptprod
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: 568:568
    ports:
      - 7359:7359/udp
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - type: bind
        source: /path/to/media
        target: /mnt/media
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.spaceduck.cloud
    networks:
      - traefik

volumes:
  jellyfin-config:
    driver_opts:
      type: "nfs"
      o: "addr=192.168.1.2,nolock,soft,rw"
      # o: "addr=truenas.spaceduck.cloud,nolock,soft,rw"
      device: ":/mnt/greatball/virtualization/truenas-apps/jellyfin/config"
  jellyfin-cache:
    driver_opts:
      type: "nfs"
      o: "addr=192.168.1.2,nolock,soft,rw"
      # o: "addr=truenas.spaceduck.cloud,nolock,soft,rw"
      device: ":/mnt/greatball/virtualization/truenas-apps/jellyfin/cache"
  jellyfin-media:
    driver_opts:
      type: "nfs"
      o: "addr=192.168.1.2,nolock,soft,rw"
      # o: "addr=truenas.spaceduck.cloud,nolock,soft,rw"
      device: ":/mnt/greatball/global/shared/plex"

networks:
  traefik:
    name: traefik_default
    external: true
  immich:
